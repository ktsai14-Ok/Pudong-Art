<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浦東美術館：多重宇宙大冒險</title>
    <!-- 使用 CDN 引入所需的庫 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #1A1B1F; /* Roblox 深色模式底色 */
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Roblox 風格背景格紋 */
        .roblox-grid {
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 方塊立體陰影 */
        .roblox-block-shadow {
            box-shadow: 0 5px 0 rgba(0, 0, 0, 0.4);
        }
        
        .roblox-block-shadow:active {
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.4);
            transform: translateY(4px);
        }

        /* Roblox 綠色 Play 按鈕 */
        .roblox-play-btn {
            background-color: #00B06F;
            border-bottom: 6px solid #008454;
            transition: all 0.1s;
        }

        .roblox-play-btn:active {
            border-bottom-width: 0px;
            transform: translateY(6px);
        }

        /* 隱藏滾動條 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 0px;
        }

        /* 輸入框 Roblox 風格 */
        .input-roblox {
            background: #232527;
            border: 2px solid #393B3D;
            color: white;
            border-radius: 8px;
        }

        .input-roblox:focus {
            border-color: #FFFFFF;
            outline: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>
<body class="roblox-grid">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 遊戲資料庫 (引用本地圖片) ---
        const SERVERS = [
            {
                id: 1,
                title: "深海生存伺服器",
                subtitle: "鯨魚的致敬",
                color: "bg-blue-600",
                image: "1鲸鱼的致敬.jpeg",
                soul: "在 34 公尺高的展廳，遇見 1:1 的巨大海洋訪客！認識阿莉亞與巴特曼的生命故事。",
                quests: [
                    { id: "1-1", type: "camera", label: "和 1:1 巨大座頭鯨拍照", tip: "找到母鯨阿莉亞或公鯨巴特曼，抬頭仰望牠們！" },
                    { id: "1-2", type: "eye", label: "找出阿莉亞背上的「家族刺青」", tip: "那是藝術家為了不讓她孤單，縫上的媽媽輪廓。" },
                    { id: "1-3", type: "search", label: "尋找巴特曼肚子上的螢光線條", tip: "這些線代表著牠在污染的大海中頑強的生命力。" },
                    { id: "1-4", type: "message-circle", label: "想一想，我們可以怎麼保護海洋？", question: "如果你是一隻鯨魚，你最希望人類停止丟什麼到海裡？" }
                ]
            },
            {
                id: 2,
                title: "魔法合成伺服器",
                subtitle: "非常畢卡索",
                color: "bg-red-500",
                image: "2非常毕加索.jpeg",
                soul: "在彩色條紋牆裡玩魔術！看天才畢卡索如何用「腳踏車坐墊」變出牛頭。",
                quests: [
                    { id: "2-1", type: "search", label: "找出廢物利用的《牛頭》", tip: "這是用舊腳踏車坐墊和把手拼出來的魔術喔！" },
                    { id: "2-2", type: "camera", label: "找到《裝扮成丑角的保羅》", tip: "畫中的小丑其實是畢卡索最愛的大兒子。" },
                    { id: "2-3", type: "eye", label: "找出時尚大師的彩色條紋", tip: "觀察牆壁！保羅·史密斯讓美術館變得像糖果屋一樣繽紛。" },
                    { id: "2-4", type: "heart", label: "選一幅你最喜歡的畫", tip: "畢卡索說過，他花了一輩子學習像孩子一樣畫畫。" }
                ]
            },
            {
                id: 3,
                title: "古文明密碼伺服器",
                subtitle: "羅浮宮：圖案的奇蹟",
                color: "bg-yellow-600",
                image: "3卢浮宫.jpg",
                soul: "化身絲路探險家！解開古代國王與騎士交換神祕圖案的「視覺密碼」。",
                quests: [
                    { id: "3-1", type: "search", label: "收集 3 種古代花紋密碼", tip: "找找陶瓷或珠寶上的幾何、花朵或藤蔓圖案。" },
                    { id: "3-2", type: "camera", label: "走進「奧斯曼宮殿」房間", tip: "這裡還原了幾百年前的國王房間，拍張探險照！" },
                    { id: "3-3", type: "message-circle", label: "看看這些花紋跟現在哪裡像？", tip: "你的包包或衣服上有類似的連續圖案嗎？" }
                ]
            },
            {
                id: 4,
                title: "未來建造者伺服器",
                subtitle: "美普繪少兒展",
                color: "bg-purple-600",
                image: "4美普绘.jpeg",
                soul: "進入 100% 回收紙張打造的太空站！看同齡小朋友如何用想像力穿越時間。",
                quests: [
                    { id: "4-1", type: "search", label: "找到喬世恒的《漫遊未來》", tip: "找找那個穿著太空服去探險的小小宇航員。" },
                    { id: "4-2", type: "camera", label: "在「時光隧道」裡留下帥照", tip: "這些全是用白色的環保紙搭出來的夢幻空間喔！" },
                    { id: "4-3", type: "message-circle", label: "如果你能打開時間之門...", question: "你想回到過去看恐龍，還是去未來坐飛船？" }
                ]
            }
        ];

        // --- 主程式組件 ---
        function App() {
            const [screen, setScreen] = useState('login'); // login, landing, dashboard, server, store
            const [playerName, setPlayerName] = useState('');
            const [selectedServer, setSelectedServer] = useState(null);
            const [completedQuests, setCompletedQuests] = useState([]);
            const [robux, setRobux] = useState(0);
            const [modalContent, setModalContent] = useState(null);
            const [moneyTip, setMoneyTip] = useState(null);

            // 更新 Lucide 圖標
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [screen, selectedServer, modalContent]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (playerName.trim()) {
                    setScreen('landing');
                }
            };

            const completeQuest = (questId) => {
                if (!completedQuests.includes(questId)) {
                    setCompletedQuests([...completedQuests, questId]);
                    setRobux(robux + 10);
                }
                setModalContent(null);
            };

            const saveMoney = () => {
                setMoneyTip(`${playerName} 真棒！存下 R幣 是通往財富自由的第一步喔！`);
                setTimeout(() => setMoneyTip(null), 3000);
            };

            return (
                <div className="max-w-md mx-auto h-screen bg-[#1A1B1F] text-white flex flex-col relative overflow-hidden roblox-grid">
                    
                    {/* 頂部狀態列 */}
                    {screen !== 'login' && screen !== 'landing' && (
                        <div className="bg-[#2A2B2E] p-4 flex justify-between items-center border-b-2 border-black z-10 shadow-lg">
                            <div className="flex items-center gap-2">
                                <div className="bg-[#00A2FF] p-1 rounded-lg roblox-block-shadow">
                                    <i data-lucide="shield" class="w-5 h-5 text-white"></i>
                                </div>
                                <div className="flex flex-col">
                                    <span className="font-black italic text-[10px] leading-none text-white uppercase tracking-tighter">PLAYER: {playerName}</span>
                                    <span className="text-[9px] text-[#A7ADB3] font-bold uppercase tracking-widest mt-0.5">Master Creator</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="bg-black/40 px-3 py-1.5 rounded-lg flex items-center gap-1.5 border border-white/5">
                                    <span className="text-yellow-400 font-black text-sm uppercase tracking-tighter">R$ {robux}</span>
                                </div>
                                <div className="bg-[#00B06F] px-3 py-1.5 rounded-lg flex items-center gap-1 border border-white/10">
                                    <i data-lucide="star" class="w-4 h-4 fill-white text-white"></i>
                                    <span className="font-black text-sm">{completedQuests.length}</span>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 主內容 */}
                    <div className="flex-1 overflow-y-auto custom-scrollbar p-4">
                        
                        {/* 0. Login Screen (Roblox 元素升級版) */}
                        {screen === 'login' && (
                            <div className="h-full flex flex-col items-center justify-between py-10 px-6 animate-in fade-in duration-700">
                                <div className="flex flex-col items-center space-y-8 w-full mt-10">
                                    <div className="relative animate-float">
                                        <div className="w-32 h-32 bg-[#393B3D] rounded-3xl flex items-center justify-center border-4 border-white shadow-2xl overflow-hidden">
                                            <img src={`https://api.dicebear.com/7.x/pixel-art/svg?seed=${playerName || 'roblox'}`} class="w-full h-full scale-110" />
                                        </div>
                                        <div className="absolute -bottom-3 -right-3 bg-[#00A2FF] p-3 rounded-full border-4 border-[#1A1B1F] text-white">
                                            <i data-lucide="sparkles" class="w-6 h-6"></i>
                                        </div>
                                    </div>
                                    
                                    <div className="text-center space-y-2">
                                        <h1 className="text-5xl font-black italic uppercase tracking-tighter leading-tight drop-shadow-lg">
                                            PUDONG ART<br/><span className="text-[#00A2FF]">QUEST</span>
                                        </h1>
                                        <p className="text-[#A7ADB3] text-xs font-black uppercase tracking-[0.3em]">Museum Multiverse</p>
                                    </div>
                                </div>

                                <div className="w-full space-y-8 bg-[#2A2B2E] p-8 rounded-[2rem] border border-white/5 shadow-2xl">
                                    <form onSubmit={handleLogin} className="space-y-6">
                                        <div className="space-y-3">
                                            <label className="text-[10px] font-black text-[#A7ADB3] uppercase tracking-widest ml-1 flex items-center gap-2">
                                                <i data-lucide="user" class="w-3 h-3"></i> LOGIN / USERNAME
                                            </label>
                                            <input 
                                                type="text" 
                                                placeholder="輸入你的名字..." 
                                                value={playerName}
                                                onChange={(e) => setPlayerName(e.target.value)}
                                                className="w-full py-5 px-6 rounded-xl text-xl font-black input-roblox text-center shadow-inner tracking-tight"
                                                maxLength="10"
                                                required
                                            />
                                        </div>
                                        
                                        <button 
                                            type="submit"
                                            className={`w-full py-6 rounded-xl text-3xl font-black text-white roblox-play-btn uppercase italic tracking-tighter flex items-center justify-center gap-3 ${playerName ? 'opacity-100' : 'opacity-50 grayscale cursor-not-allowed'}`}
                                            disabled={!playerName}
                                        >
                                            PLAY <i data-lucide="play" class="w-8 h-8 fill-current"></i>
                                        </button>
                                    </form>
                                    
                                    <div className="flex flex-col items-center gap-2">
                                        <div className="flex gap-4">
                                            <div className="w-2 h-2 rounded-full bg-green-500"></div>
                                            <div className="w-2 h-2 rounded-full bg-white/20"></div>
                                            <div className="w-2 h-2 rounded-full bg-white/20"></div>
                                        </div>
                                        <p className="text-[9px] font-black text-[#656A6E] uppercase tracking-widest">v1.4 Master Edition</p>
                                    </div>
                                </div>
                                <div className="mt-4 text-[10px] text-[#A7ADB3] font-bold text-center opacity-50">
                                    Pudong Art Museum × Master Creator
                                </div>
                            </div>
                        )}

                        {/* 1. Landing Screen */}
                        {screen === 'landing' && (
                            <div className="h-full flex flex-col items-center justify-center text-center space-y-10 px-6 animate-in zoom-in duration-500">
                                <div className="relative">
                                    <div className="w-40 h-40 bg-[#393B3D] rounded-[2.5rem] border-4 border-white shadow-2xl overflow-hidden">
                                        <img src={`https://api.dicebear.com/7.x/pixel-art/svg?seed=${playerName}`} className="w-full h-full scale-125" />
                                    </div>
                                    <div className="absolute -bottom-2 -right-2 bg-yellow-400 p-3 rounded-full border-4 border-[#1A1B1F] text-black shadow-lg">
                                        <i data-lucide="trophy" class="w-8 h-8"></i>
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    <p className="text-[#00A2FF] font-black text-lg uppercase tracking-widest">WELCOME, {playerName}!</p>
                                    <h1 className="text-5xl font-black italic tracking-tighter uppercase leading-none">
                                        PUDONG ART<br/><span className="text-white">DASHBOARD</span>
                                    </h1>
                                </div>
                                <button 
                                    onClick={() => setScreen('dashboard')}
                                    className="roblox-play-btn text-white w-full py-6 rounded-2xl text-3xl font-black italic uppercase"
                                >
                                    START ADVENTURE
                                </button>
                                <p className="text-[10px] text-[#A7ADB3] font-bold uppercase tracking-[0.2em]">連線伺服器：浦東美術館-1號</p>
                            </div>
                        )}

                        {/* 2. Dashboard Screen */}
                        {screen === 'dashboard' && (
                            <div className="space-y-6 pb-24 animate-in slide-in-from-bottom duration-500">
                                <div className="bg-gradient-to-r from-[#00A2FF] to-[#0074BD] p-6 rounded-3xl relative overflow-hidden roblox-block-shadow">
                                    <h2 className="text-2xl font-black italic uppercase leading-none mb-1">伺服器列表</h2>
                                    <p className="text-blue-100 text-xs font-bold opacity-80 uppercase">穿梭四大展覽宇宙</p>
                                    <i data-lucide="server" class="absolute -right-4 -bottom-4 w-24 h-24 text-white/10 rotate-12"></i>
                                </div>
                                <div className="grid gap-5">
                                    {SERVERS.map(server => (
                                        <div 
                                            key={server.id}
                                            onClick={() => { setSelectedServer(server); setScreen('server'); }}
                                            className={`${server.color} rounded-[2rem] overflow-hidden border-2 border-white/10 active:scale-95 transition-all cursor-pointer shadow-xl group`}
                                        >
                                            <div className="h-44 relative">
                                                <img src={server.image} className="w-full h-full object-cover group-hover:scale-110 transition-duration-500" />
                                                <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent p-5 flex flex-col justify-end text-white text-left">
                                                    <h3 className="text-2xl font-black italic leading-none">{server.title}</h3>
                                                    <p className="text-[10px] font-bold opacity-70 uppercase tracking-widest mt-1">{server.subtitle}</p>
                                                </div>
                                            </div>
                                            <div className="bg-black/20 p-4 flex justify-between items-center text-[10px] font-black uppercase tracking-tight">
                                                <div className="flex gap-1.5">
                                                    {server.quests.map((q, i) => (
                                                        <div key={i} className={`w-3 h-3 rounded-sm rotate-45 ${completedQuests.includes(q.id) ? 'bg-yellow-400' : 'bg-white/20'}`}></div>
                                                    ))}
                                                </div>
                                                <div className="flex items-center gap-1">
                                                    JOIN SERVER <i data-lucide="chevron-right" class="w-3 h-3"></i>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 3. Server Quest View */}
                        {screen === 'server' && selectedServer && (
                            <div className="space-y-6 pb-24 animate-in slide-in-from-right duration-500">
                                <button onClick={() => setScreen('dashboard')} className="flex items-center gap-2 text-xs font-black text-[#A7ADB3] uppercase tracking-widest active:text-white">
                                    <i data-lucide="arrow-left" class="w-4 h-4"></i> BACK TO SERVERS
                                </button>
                                <div className="rounded-[2.5rem] overflow-hidden roblox-block-shadow bg-[#2A2B2E] border border-white/5">
                                    <img src={selectedServer.image} className="w-full h-64 object-cover" />
                                    <div className="p-6 text-left">
                                        <h2 className="text-3xl font-black italic tracking-tighter uppercase text-white leading-none">{selectedServer.title}</h2>
                                        <p className="text-[#A7ADB3] text-[10px] font-black uppercase tracking-widest mt-2">{selectedServer.subtitle}</p>
                                        <div className="mt-6 bg-[#1A1B1F] border border-white/5 p-5 rounded-2xl flex gap-4 text-sm font-bold text-[#D3D6D9] shadow-inner">
                                            <div className="bg-[#00A2FF] p-2 rounded-lg shrink-0">
                                                <i data-lucide="info" class="w-5 h-5 text-white"></i>
                                            </div>
                                            <p class="leading-relaxed">{selectedServer.soul}</p>
                                        </div>
                                    </div>
                                </div>
                                <h3 className="text-xl font-black italic flex items-center gap-3 text-white uppercase tracking-tighter">
                                    <div className="bg-[#00B06F] p-1.5 rounded-lg roblox-block-shadow"><i data-lucide="check-circle-2" class="w-5 h-5 text-white"></i></div>
                                    QUEST LIST
                                </h3>
                                <div className="space-y-4">
                                    {selectedServer.quests.map(quest => (
                                        <div 
                                            key={quest.id} 
                                            onClick={() => setModalContent(quest)}
                                            className={`p-5 rounded-2xl border-2 flex items-center justify-between roblox-block-shadow transition-all cursor-pointer ${completedQuests.includes(quest.id) ? 'bg-[#00B06F]/10 border-[#00B06F]' : 'bg-[#2A2B2E] border-white/5'}`}
                                        >
                                            <div className="flex items-center gap-5">
                                                <div className={`w-14 h-14 rounded-2xl flex items-center justify-center ${completedQuests.includes(quest.id) ? 'bg-[#00B06F]' : 'bg-[#393B3D] text-[#A7ADB3]'}`}>
                                                    <i data-lucide={quest.type} class="w-7 h-7 text-white"></i>
                                                </div>
                                                <div class="text-left">
                                                    <h4 className="font-black text-base leading-tight">{quest.label}</h4>
                                                    <p className="text-[10px] text-[#A7ADB3] font-black uppercase tracking-wider mt-1">{quest.tip}</p>
                                                </div>
                                            </div>
                                            {completedQuests.includes(quest.id) && <i data-lucide="award" class="text-yellow-400 w-8 h-8 animate-pulse"></i>}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 4. Store Screen */}
                        {screen === 'store' && (
                            <div className="space-y-10 flex flex-col items-center py-10 animate-in slide-in-from-bottom duration-500">
                                <div className="w-28 h-28 bg-yellow-500 rounded-[2rem] flex items-center justify-center border-4 border-black roblox-block-shadow">
                                    <i data-lucide="shopping-bag" class="w-14 h-14 text-black"></i>
                                </div>
                                <div className="text-center">
                                    <h2 className="text-4xl font-black italic uppercase tracking-tighter">理財精靈商店</h2>
                                    <p className="text-[#A7ADB3] text-xs font-black uppercase tracking-widest mt-2">Manage your R$ Rewards</p>
                                </div>
                                <div className="bg-[#2A2B2E] p-8 rounded-[3rem] w-full border border-white/5 space-y-8 roblox-block-shadow">
                                    <div className="flex items-center gap-6">
                                        <div className="w-24 h-24 bg-white rounded-3xl overflow-hidden border-4 border-yellow-500 shrink-0 rotate-3 shadow-2xl relative">
                                            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=MoneyDog" />
                                            <div class="absolute inset-0 bg-yellow-500/10"></div>
                                        </div>
                                        <div class="bg-yellow-400 text-black p-4 rounded-2xl text-[11px] font-black italic roblox-block-shadow leading-relaxed text-left relative">
                                            嗨 {playerName}！看到紀念品店想亂買東西嗎？先問問自己：這是「需要」還是「想要」呢？
                                            <div class="absolute top-1/2 -left-2 w-4 h-4 bg-yellow-400 rotate-45 transform -translate-y-1/2"></div>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={saveMoney}
                                        className="bg-yellow-600 w-full py-5 rounded-2xl text-xl font-black roblox-block-shadow flex items-center justify-center gap-4 text-white"
                                    >
                                        <i data-lucide="piggy-bank" class="w-8 h-8"></i> 存進夢想儲蓄罐
                                    </button>
                                </div>
                                {moneyTip && <div className="bg-[#00B06F] text-white p-5 rounded-2xl font-black text-center animate-bounce text-sm shadow-2xl border-2 border-white/20 italic">{moneyTip}</div>}
                            </div>
                        )}
                    </div>

                    {/* 互動彈窗 */}
                    {modalContent && (
                        <div className="absolute inset-0 z-50 bg-black/90 backdrop-blur-xl flex items-center justify-center p-6 animate-in fade-in duration-300">
                            <div className="bg-[#2A2B2E] w-full rounded-[3rem] p-8 border-4 border-[#00A2FF] flex flex-col gap-8 roblox-block-shadow">
                                <div className="text-center">
                                    <div class="inline-block px-3 py-1 bg-[#00A2FF] rounded-full text-[10px] font-black uppercase tracking-widest mb-4">Quest Module</div>
                                    <h3 className="text-3xl font-black italic uppercase tracking-tighter leading-none text-white">{modalContent.label}</h3>
                                    <p className="text-[#A7ADB3] text-[10px] font-black uppercase mt-4 tracking-[0.15em] leading-relaxed">{modalContent.tip}</p>
                                </div>
                                
                                {modalContent.type === 'camera' ? (
                                    <div className="aspect-video bg-black rounded-[2rem] flex flex-col items-center justify-center border-2 border-dashed border-white/20 gap-5 relative overflow-hidden group shadow-inner">
                                        <i data-lucide="camera" class="w-16 h-16 text-white/10 group-hover:text-[#00A2FF] transition-colors"></i>
                                        <div className="w-20 h-20 rounded-full border-4 border-white flex items-center justify-center cursor-pointer active:scale-90 transition-all bg-white/5 relative">
                                            <div className="w-14 h-14 bg-white rounded-full"></div>
                                            <div class="absolute inset-0 border-2 border-white rounded-full animate-ping opacity-20"></div>
                                        </div>
                                        <p className="text-[10px] font-black text-white/30 uppercase tracking-[0.2em]">分析藝術品數據中...</p>
                                    </div>
                                ) : modalContent.question ? (
                                    <div className="space-y-4">
                                        <div className="bg-[#1A1B1F] p-6 rounded-2xl italic text-[#00A2FF] text-sm font-bold border border-[#00A2FF]/20 leading-relaxed shadow-inner">
                                            「{modalContent.question}」
                                        </div>
                                        <textarea 
                                            placeholder="輸入你的大發現..."
                                            className="w-full bg-[#1A1B1F] border-2 border-white/5 rounded-2xl p-6 text-sm font-bold text-white focus:border-[#00A2FF] outline-none h-36 resize-none transition-all placeholder:opacity-30"
                                        ></textarea>
                                    </div>
                                ) : (
                                    <div className="py-12 flex flex-col items-center bg-black/20 rounded-[2rem]">
                                        <div className="bg-[#00B06F] p-6 rounded-full shadow-2xl mb-8 animate-bounce"><i data-lucide="check" class="w-12 h-12 text-white"></i></div>
                                        <p className="font-black text-2xl italic text-white uppercase tracking-tighter">Master Observer!</p>
                                        <p class="text-[#00B06F] font-black text-xs uppercase tracking-widest mt-2">樂樂觀察得非常認真！</p>
                                    </div>
                                )}
                                
                                <div className="flex gap-4">
                                    <button onClick={() => setModalContent(null)} className="flex-1 bg-[#393B3D] text-[#A7ADB3] font-black py-5 rounded-2xl text-[11px] uppercase tracking-[0.2em] roblox-block-shadow">BACK</button>
                                    <button onClick={() => completeQuest(modalContent.id)} className="flex-[2] roblox-play-btn text-white font-black py-5 rounded-2xl text-xl italic uppercase tracking-tighter">COMPLETE +10 R$</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 底部導覽列 */}
                    {screen !== 'login' && screen !== 'landing' && (
                        <nav className="bg-[#2A2B2E] border-t-2 border-black p-4 pb-10 flex justify-around items-center z-10 shadow-[0_-15px_30px_rgba(0,0,0,0.6)]">
                            <button onClick={() => setScreen('dashboard')} className={`flex flex-col items-center gap-1.5 ${screen === 'dashboard' || screen === 'server' ? 'text-[#00A2FF] scale-110' : 'text-[#A7ADB3]'} transition-all group`}>
                                <div class={`p-2 rounded-xl transition-all ${screen === 'dashboard' || screen === 'server' ? 'bg-[#00A2FF]/20 shadow-inner' : ''}`}>
                                    <i data-lucide="map" class="w-7 h-7"></i>
                                </div>
                                <span className="text-[9px] font-black uppercase tracking-widest">MAP</span>
                            </button>
                            
                            <button onClick={() => setScreen('store')} className={`flex flex-col items-center gap-1.5 ${screen === 'store' ? 'text-yellow-500 scale-110' : 'text-[#A7ADB3]'} transition-all group`}>
                                <div class={`p-2 rounded-xl transition-all ${screen === 'store' ? 'bg-yellow-500/20 shadow-inner' : ''}`}>
                                    <i data-lucide="shopping-bag" class="w-7 h-7"></i>
                                </div>
                                <span className="text-[9px] font-black uppercase tracking-widest">STORE</span>
                            </button>
                            
                            {completedQuests.length > 0 && (
                                <button onClick={() => setScreen('login')} className="bg-[#F74B53] text-white px-6 py-3 rounded-xl font-black text-[10px] uppercase italic roblox-block-shadow active:translate-y-1 transition-all flex items-center gap-2 border-b-4 border-[#B82B31]">
                                    END <i data-lucide="log-out" class="w-3 h-3"></i>
                                </button>
                            )}
                        </nav>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
